<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a1814">
    <meta name="description" content="Papyrus Reader - Aplikasi pembaca buku digital berbagai format">
    <title>Papyrus Reader</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="assets/icons/icon-192.png">
    <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
    
    <!-- Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/dexie@3.2.4/dist/dexie.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/epubjs@0.3.93/dist/epub.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    
    <!-- Styles -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- ===== HEADER ===== -->
        <header id="appHeader">
            <div class="logo">
                <span class="logo-icon">📖</span>
                <span class="logo-text">Papyrus</span>
            </div>
            <div class="header-actions">
                <button class="btn-icon" id="themeToggle" title="Ganti tema" aria-label="Ganti tema">
                    <span id="themeIcon">🌙</span>
                </button>
                <button class="btn-icon" id="uploadBtn" title="Tambah buku" aria-label="Tambah buku">
                    <span>＋</span>
                </button>
            </div>
        </header>

        <!-- ===== LIBRARY ===== -->
        <main id="library">
            <!-- Drop Zone -->
            <div class="dropzone" id="dropzone">
                <div class="dropzone-content">
                    <div class="dropzone-icon">📚</div>
                    <h3>Seret &amp; Lepas Buku di Sini</h3>
                    <p>Support: EPUB, PDF, TXT, Markdown</p>
                    <span class="dropzone-hint">atau klik tombol + di atas</span>
                </div>
            </div>

            <!-- Books Grid -->
            <div class="books-grid" id="booksGrid"></div>

            <!-- Empty State -->
            <div class="empty-state" id="emptyState">
                <div class="empty-icon">📕</div>
                <h3>Belum Ada Buku</h3>
                <p>Upload buku pertamamu untuk mulai membaca</p>
                <button class="btn-primary" id="emptyUploadBtn">Upload Buku</button>
            </div>
        </main>

        <!-- ===== READER CONTAINER ===== -->
        <div id="reader-container" class="reader-hidden">
            <!-- Toolbar -->
            <div class="reader-toolbar" id="readerToolbar">
                <div class="toolbar-left">
                    <button class="toolbar-btn" id="readerBack" title="Kembali ke perpustakaan">←</button>
                    <button class="toolbar-btn" id="readerToc" title="Daftar Isi">☰</button>
                    <button class="toolbar-btn" id="readerBookmark" title="Tandai halaman">🔖</button>
                </div>
                <div class="toolbar-center" id="readerPageInfo">
                    <span id="pageIndicator">Hal 1 / 1</span>
                </div>
                <div class="toolbar-right">
                    <button class="toolbar-btn" id="readerSettings" title="Pengaturan">⚙️</button>
                    <button class="toolbar-btn" id="readerFullscreen" title="Layar penuh">⛶</button>
                </div>
            </div>

            <!-- Flipbook Area -->
            <div class="flipbook-wrapper" id="flipbookWrapper">
                <div class="flipbook" id="flipbook">
                    <div class="page page-left" id="pageLeft"></div>
                    <div class="page page-right" id="pageRight"></div>
                </div>
                <!-- Tap zones -->
                <div class="tap-zone tap-left" id="tapLeft"></div>
                <div class="tap-zone tap-right" id="tapRight"></div>
                <div class="tap-zone tap-center" id="tapCenter"></div>
            </div>

            <!-- Progress Bar -->
            <div class="reader-progress" id="readerProgress">
                <div class="progress-track">
                    <div class="progress-fill" id="progressFill" style="width:0%"></div>
                </div>
            </div>

            <!-- TOC Panel (slide-in) -->
            <div class="side-panel" id="tocPanel">
                <div class="panel-header">
                    <h3>Daftar Isi</h3>
                    <button class="panel-close" id="tocClose">✕</button>
                </div>
                <ul id="tocList"></ul>
            </div>
            <div class="panel-overlay" id="panelOverlay"></div>
        </div>

        <!-- ===== FOOTER ===== -->
        <footer id="appFooter">
            <span class="footer-stats" id="footerStats">0 buku</span>
            <span class="footer-version">Papyrus v1.0</span>
        </footer>
    </div>

    <!-- Hidden file input -->
    <input type="file" id="fileInput" accept=".epub,.pdf,.txt,.md" multiple style="display:none">

    <!-- ===== SCRIPTS ===== -->
    <!-- Utility -->
    <script src="js/utils/helpers.js"></script>
    
    <!-- Engines -->
    <script src="js/engines/base.js"></script>
    <script src="js/engines/epub.js"></script>
    <script src="js/engines/pdf.js"></script>
    <script src="js/engines/txt.js"></script>
    <script src="js/engines/markdown.js"></script>
    
    <!-- Core -->
    <script src="js/paginator.js"></script>
    <script src="js/flipbook.js"></script>
    <script src="js/reader.js"></script>
    
    <!-- Main App -->
    <script src="app.js"></script>
</body>
</html>
